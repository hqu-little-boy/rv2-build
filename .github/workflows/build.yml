name: Build Armbian Server Images (Multi-Release & Multi-Kernel)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0-manual-20260709)'
        required: true
        type: string
      test_release:
        description: '目标发行版 (选择 all 则构建所有)'
        required: true
        type: choice
        options:
          - all
          - trixie
          - resolute
          - noble
          - bookworm
      test_kernel_branch:
        description: '目标内核分支 (选择 all 则构建所有)'
        required: true
        type: choice
        options:
          - all
          - legacy
          - current
          - edge
  push:
    tags:
      - 'v*'

jobs:
  # 🛠️ 新增：动态决定需要构建的矩阵组合
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.set-vars.outputs.releases }}
      kernels: ${{ steps.set-vars.outputs.kernels }}
    steps:
      - name: 计算矩阵组合
        id: set-vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REL="${{ github.event.inputs.test_release }}"
            KER="${{ github.event.inputs.test_kernel_branch }}"
            
            if [ "$REL" != "all" ]; then
              echo "releases=[\"$REL\"]" >> $GITHUB_OUTPUT
            else
              echo "releases=[\"trixie\", \"resolute\", \"noble\", \"bookworm\"]" >> $GITHUB_OUTPUT
            fi
            
            if [ "$KER" != "all" ]; then
              echo "kernels=[\"$KER\"]" >> $GITHUB_OUTPUT
            else
              echo "kernels=[\"legacy\", \"current\", \"edge\"]" >> $GITHUB_OUTPUT
            fi
          else
            # Push 标签触发时，默认全量构建
            echo "releases=[\"trixie\", \"resolute\", \"noble\", \"bookworm\"]" >> $GITHUB_OUTPUT
            echo "kernels=[\"legacy\", \"current\", \"edge\"]" >> $GITHUB_OUTPUT
          fi

  # 🏗️ 构建任务：根据 setup-matrix 的输出生成矩阵
  build:
    needs: setup-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 720
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        # 🧠 核心逻辑：将上一步输出的 JSON 字符串解析为数组
        release: ${{ fromJSON(needs.setup-matrix.outputs.releases) }}
        kernel_branch: ${{ fromJSON(needs.setup-matrix.outputs.kernels) }}

    steps:
      - uses: armbian/build@main
        with:
          armbian_token: ${{ secrets.GITHUB_TOKEN }}
          armbian_board: "orangepirv2"
          armbian_release: ${{ matrix.release }}
          armbian_kernel_branch: ${{ matrix.kernel_branch }}
          armbian_target: "build"
          armbian_ui: "server"
          armbian_runner_clean: "yes"

  # 📦 发布任务 (保持原有逻辑不变)
  release:
    needs: build
    runs-on: ubuntu-latest
    # 只有在手动触发（且版本号不为空）或推送标签时才运行
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '')
    # ⚠️ 关键修复：授予创建 Release 的权限
    permissions:
      contents: write
    steps:
      - name: 下载所有构建产物 (Artifacts)
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release 并上传资产
        uses: softprops/action-gh-release@v2
        with:
          # 自动确定标签名：标签事件用标签名，手动触发用输入的版本号
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.release_version }}
          files: artifacts/**
          create_tag: true          # 如果标签不存在则自动创建
          token: ${{ secrets.GITHUB_TOKEN }}   # 显式传递 token（可选但建议）
